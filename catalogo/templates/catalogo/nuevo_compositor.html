{% extends 'catalogo/base.html' %}
{% block title %}Añadir Nuevo Compositor{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-musical border-0 border-start border-primary border-4">
                <div class="card-body p-4">
                    <h2 class="card-title fw-bold text-primary mb-4">Añadir Nuevo Compositor</h2>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="mt-4">
                            <button type="submit" class="btn btn-music">Guardar Compositor</button>
                            <a href="{% url 'lista_compositores' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
