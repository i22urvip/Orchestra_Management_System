{% extends 'catalogo/base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block hero %}
<div class="page-hero">
    <h1>Editar Usuario</h1>
    <p class="mb-0">Modifica los datos del usuario {{ usuario.username }}.</p>
</div>
{% endblock %}
{% block content %}
<div class="card shadow-musical border-0 mb-5">
    <div class="card-header bg-primary text-white py-3">
        <h3 class="mb-0">Datos del usuario</h3>
    </div>
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="btn btn-music">Guardar cambios</button>
                <a href="{% url 'lista_usuarios' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
