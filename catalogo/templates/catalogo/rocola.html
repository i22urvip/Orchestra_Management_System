{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocola Clásica - El Rincón del Músico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      /* Paleta Corporativa */
      --fondo-crema: #EAE5D9;
      --burdeos-texto: #8C1528;
      
      /* Colores Neón para el interior de la Rocola */
      --neon-burdeos: #D91A3C; 
      --neon-naranja: #FF5E00;
      --neon-crema: #FFF0C2;
      --chrome: #C0C0C0;
      
      /* Brillos */
      --glow-burdeos: 0 0 10px var(--neon-burdeos), 0 0 20px var(--neon-burdeos);
      --glow-naranja: 0 0 10px var(--neon-naranja), 0 0 20px var(--neon-naranja);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--fondo-crema);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* LINEAS DE ESCANEO MUY SUTILES PARA EL FONDO CLARO */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.02) 2px,
        rgba(0,0,0,0.02) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    h1.brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      color: var(--burdeos-texto);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
      letter-spacing: 6px;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .subtitle {
      font-family: 'Special Elite', cursive;
      color: #555;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 4px;
      margin-bottom: 2rem;
    }

    /* GABINETE DE LA ROCOLA */
    .jukebox-cabinet {
      background: linear-gradient(180deg, #2A0800 0%, #1A0500 40%, #0D0200 100%);
      border: 3px solid #5A3010;
      border-radius: 30px 30px 10px 10px;
      box-shadow:
        0 0 0 6px #3D1C02,
        0 0 0 9px #5A3010,
        0 20px 40px rgba(0,0,0,0.3);
      max-width: 860px;
      margin: 0 auto 3rem;
      padding: 2rem 2rem 2.5rem;
      position: relative;
    }

    /* ARCO SUPERIOR DECORATIVO */
    .cabinet-arch {
      background: linear-gradient(90deg,
        transparent 0%, var(--neon-burdeos) 20%, var(--neon-naranja) 40%, var(--neon-crema) 60%, var(--neon-burdeos) 80%, transparent 100%);
      height: 6px;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      animation: rainbow-flow 4s linear infinite;
      background-size: 200% 100%;
    }
    @keyframes rainbow-flow {
      0%{ background-position: 0% 0%; }
      100%{ background-position: 200% 0%; }
    }

    /* CARRUSEL DE VINILOS */
    .vinyl-stage {
      position: relative;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 800px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .vinyl-track {
      display: flex;
      align-items: center;
      gap: 0;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform-style: preserve-3d;
    }

    .vinyl-slot {
      width: 200px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .vinyl-record {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      transition: all 0.4s ease;
      flex-shrink: 0;
    }

    /* Vinilos laterales */
    .vinyl-slot.side-left-1 .vinyl-record,
    .vinyl-slot.side-right-1 .vinyl-record {
      width: 140px; height: 140px;
      opacity: 0.5;
      filter: brightness(0.5) blur(1px);
    }
    .vinyl-slot.side-left-2 .vinyl-record,
    .vinyl-slot.side-right-2 .vinyl-record {
      width: 110px; height: 110px;
      opacity: 0.25;
      filter: brightness(0.3) blur(2px);
    }
    .vinyl-slot.far-side .vinyl-record {
      width: 80px; height: 80px;
      opacity: 0.1;
      filter: brightness(0.2) blur(3px);
    }

    .vinyl-slot.active .vinyl-record {
      width: 200px; height: 200px;
      filter: brightness(1.1) drop-shadow(0 0 15px currentColor);
    }

    .vinyl-record svg { width: 100%; height: 100%; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .vinyl-record.playing { animation: spin 2s linear infinite; }

    /* PANTALLA DE INFORMACIÓN */
    .song-display {
      background: #000;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px rgba(255,240,194,0.1);
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .display-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--neon-crema);
      letter-spacing: 2px;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .display-artist {
      font-family: 'Special Elite', cursive;
      color: var(--neon-naranja);
      font-size: 1rem;
      margin-top: 4px;
    }

    .display-meta {
      display: flex; gap: 1rem;
      margin-top: 6px;
      font-size: 0.8rem;
      color: rgba(192,192,192,0.6);
    }

    /* Barra de progreso */
    .progress-bar-wrap {
      background: #111;
      border-radius: 4px;
      height: 4px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-burdeos), var(--neon-naranja));
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* CONTROLES */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .ctrl-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid;
      background: transparent;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn.prev, .ctrl-btn.next {
      border-color: var(--chrome);
      color: var(--chrome);
    }
    .ctrl-btn.prev:hover, .ctrl-btn.next:hover {
      border-color: var(--neon-crema);
      color: var(--neon-crema);
    }

    .ctrl-btn.play-pause {
      width: 70px; height: 70px;
      border-color: var(--neon-burdeos);
      color: var(--neon-burdeos);
      font-size: 1.6rem;
      background: rgba(217,26,60,0.1);
    }
    .ctrl-btn.play-pause:hover,
    .ctrl-btn.play-pause.active {
      background: rgba(217,26,60,0.25);
      box-shadow: var(--glow-burdeos);
    }

    .ctrl-btn.play-pause.active {
      animation: pulse-btn 1s ease infinite;
    }
    @keyframes pulse-btn {
      0%,100%{ box-shadow: var(--glow-burdeos); }
      50%{ box-shadow: 0 0 5px var(--neon-burdeos); }
    }

    /* LISTA DE CANCIONES */
    .song-list-panel {
      background: rgba(0,0,0,0.5);
      border: 1px solid #2A2A2A;
      border-radius: 8px;
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--neon-burdeos) #111;
    }

    .song-list-panel::-webkit-scrollbar { width: 6px; }
    .song-list-panel::-webkit-scrollbar-track { background: #111; }
    .song-list-panel::-webkit-scrollbar-thumb { background: var(--neon-burdeos); border-radius: 3px; }

    .song-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #1A1A1A;
      cursor: pointer;
      transition: background 0.2s;
    }
    .song-row:hover { background: rgba(217,26,60,0.08); }
    .song-row.active { background: rgba(217,26,60,0.15); border-left: 3px solid var(--neon-burdeos); }

    .song-row .num {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--chrome);
      font-size: 1.1rem;
      min-width: 28px;
      text-align: center;
    }

    .song-row .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .song-row .info { flex: 1; min-width: 0; }
    .song-row .info .t {
      font-weight: 700;
      color: #EEE;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-row .info .a {
      font-size: 0.8rem;
      color: rgba(192,192,192,0.6);
    }

    /* ALERTAS */
    .alert-jukebox {
      background: rgba(0,0,0,0.8);
      border-left: 4px solid var(--neon-crema);
      color: var(--neon-crema);
      font-family: 'Special Elite', cursive;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    /* LUCES DECORATIVAS */
    .lights-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.2rem;
    }

    .light-bulb {
      width: 14px; height: 14px;
      border-radius: 50%;
      animation: blink-seq 1.5s infinite;
    }

    .light-bulb:nth-child(1) { background: var(--neon-burdeos); box-shadow: 0 0 6px var(--neon-burdeos); animation-delay: 0s; }
    .light-bulb:nth-child(2) { background: var(--neon-naranja); box-shadow: 0 0 6px var(--neon-naranja); animation-delay: 0.2s; }
    .light-bulb:nth-child(3) { background: var(--neon-crema); box-shadow: 0 0 6px var(--neon-crema); animation-delay: 0.4s; }
    .light-bulb:nth-child(4) { background: var(--neon-burdeos); box-shadow: 0 0 6px var(--neon-burdeos); animation-delay: 0.6s; }
    .light-bulb:nth-child(5) { background: var(--neon-naranja); box-shadow: 0 0 6px var(--neon-naranja); animation-delay: 0.8s; }
    .light-bulb:nth-child(6) { background: var(--neon-crema); box-shadow: 0 0 6px var(--neon-crema); animation-delay: 1.0s; }
    .light-bulb:nth-child(7) { background: var(--neon-burdeos); box-shadow: 0 0 6px var(--neon-burdeos); animation-delay: 1.2s; }
    .light-bulb:nth-child(8) { background: var(--neon-naranja); box-shadow: 0 0 6px var(--neon-naranja); animation-delay: 1.4s; }

    @keyframes blink-seq {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    footer {
      text-align: center;
      color: #666;
      font-size: 0.8rem;
      padding: 1rem;
      font-family: 'Special Elite', cursive;
    }

    @media (max-width: 576px) {
      .vinyl-stage { height: 240px; }
      .vinyl-slot.active .vinyl-record { width: 150px; height: 150px; }
      .jukebox-cabinet { padding: 1.2rem; border-radius: 20px 20px 8px 8px; }
    }
  </style>
</head>
<body>

<div class="container-fluid px-3">
  
  <div class="text-center mt-3">
    <a href="{% url 'lista_obras' %}" class="btn btn-outline-dark btn-sm" style="font-family: 'Rajdhani', sans-serif;">
      Volver al Catálogo
    </a>
  </div>

  <h1 class="brand">ROCOLA CLÁSICA</h1>
  <p class="subtitle">— EL RINCÓN DEL MÚSICO —</p>

  <div id="alertBox" class="container" style="max-width:860px;display:none;">
    <div id="alertMsg" class="alert alert-jukebox alert-dismissible mb-3" role="alert">
      <span id="alertText"></span>
      <button type="button" class="btn-close btn-close-white" onclick="hideAlert()"></button>
    </div>
  </div>

  <div class="jukebox-cabinet">

    <div class="lights-bar">
      <div class="light-bulb"></div><div class="light-bulb"></div><div class="light-bulb"></div>
      <div class="light-bulb"></div><div class="light-bulb"></div><div class="light-bulb"></div>
      <div class="light-bulb"></div><div class="light-bulb"></div>
    </div>

    <div class="cabinet-arch"></div>

    <div class="vinyl-stage">
      <div class="vinyl-track" id="vinylTrack"></div>
    </div>

    <div class="song-display" id="songDisplay">
      <div class="display-title" id="displayTitle">SELECCIONA UNA OBRA</div>
      <div class="display-artist" id="displayArtist">— Usa las flechas para navegar —</div>
      <div class="display-meta">
        <span><i class="bi bi-clock"></i> <span id="displayDuration">0:00</span></span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="controls-row">
      <button class="ctrl-btn prev" onclick="navigate(-1)" title="Anterior">
        <i class="bi bi-skip-start-fill"></i>
      </button>
      <button class="ctrl-btn play-pause" id="playBtn" onclick="togglePlay()" title="Play/Pause">
        <i class="bi bi-play-fill" id="playIcon"></i>
      </button>
      <button class="ctrl-btn next" onclick="navigate(1)" title="Siguiente">
        <i class="bi bi-skip-end-fill"></i>
      </button>
    </div>

    <div style="margin-bottom:0.5rem; display:flex; align-items:center; justify-content:space-between;">
      <span style="font-family:'Bebas Neue',sans-serif; color:var(--chrome); letter-spacing:2px; font-size:1rem;">
        REPERTORIO — <span id="songCount">0</span> OBRAS
      </span>
      <input type="text" class="form-control form-control-sm" id="searchInput"
        style="max-width:200px; background:#111!important; border-color:#333!important; color:#DDD!important;"
        placeholder="Buscar..." oninput="filterSongs(this.value)">
    </div>

    <div class="song-list-panel" id="songListPanel"></div>

  </div>

  <footer>Django 6 · PostgreSQL (Neon) · Bootstrap 5 &nbsp;|&nbsp; El Rincón del Músico</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let songs = {{ songs_json|safe }};

// Paleta de colores dinámica
const paletaColores = ['#D91A3C', '#FF5E00', '#00F5FF', '#FFD60A', '#9D00FF', '#00FF88'];
songs.forEach((s, index) => {
    s.color = paletaColores[index % paletaColores.length];
});

let currentIndex = 0;
let isPlaying = false;
let currentAudio = new Audio(); // Objeto de audio nativo

// Eventos del reproductor
currentAudio.addEventListener('timeupdate', () => {
    if (currentAudio.duration) {
        const progressPercent = (currentAudio.currentTime / currentAudio.duration) * 100;
        document.getElementById('progressBar').style.width = progressPercent + '%';
        
        const currentMins = Math.floor(currentAudio.currentTime / 60);
        const currentSecs = Math.floor(currentAudio.currentTime % 60).toString().padStart(2, '0');
        document.getElementById('displayDuration').textContent = `${currentMins}:${currentSecs}`;
    }
});

currentAudio.addEventListener('ended', () => {
    navigate(1); // Saltar a la siguiente al terminar
});

function makeVinylSVG(color, title, artist) {
  const shortTitle = title.length > 10 ? title.substring(0, 10) + '…' : title;
  const shortArtist = artist.length > 12 ? artist.substring(0, 12) + '…' : artist;
  let grooves = '';
  for (let r = 82; r > 48; r -= 4) {
    const opacity = 0.08 + (82 - r) * 0.003;
    grooves += `<circle cx="100" cy="100" r="${r}" fill="none" stroke="rgba(255,255,255,${opacity})" stroke-width="0.8"/>`;
  }
  return `
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="vg${color.replace('#','')}" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="${lighten(color,0.3)}"/>
        <stop offset="100%" stop-color="${darken(color,0.5)}"/>
      </radialGradient>
      <radialGradient id="labelGrad" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="${lighten(color,0.8)}"/>
        <stop offset="100%" stop-color="${lighten(color,0.5)}"/>
      </radialGradient>
      <filter id="vsh">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="${color}" flood-opacity="0.5"/>
      </filter>
    </defs>
    <circle cx="100" cy="100" r="96" fill="#111" filter="url(#vsh)"/>
    <circle cx="100" cy="100" r="90" fill="url(#vg${color.replace('#','')})"/>
    ${grooves}
    <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="30" fill="url(#labelGrad)"/>
    <circle cx="100" cy="100" r="28" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="100" y="94" text-anchor="middle" font-family="Bebas Neue, sans-serif" font-size="8" fill="rgba(0,0,0,0.8)" letter-spacing="0.5">${shortTitle}</text>
    <text x="100" y="104" text-anchor="middle" font-family="Rajdhani, sans-serif" font-size="6" fill="rgba(0,0,0,0.6)">${shortArtist}</text>
    <circle cx="100" cy="100" r="5" fill="#0D0D0D"/>
    <circle cx="100" cy="100" r="3" fill="#333"/>
    <ellipse cx="72" cy="68" rx="18" ry="10" fill="rgba(255,255,255,0.07)" transform="rotate(-35,72,68)"/>
  </svg>`;
}

function lighten(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.round(r + (255-r)*amount));
  g = Math.min(255, Math.round(g + (255-g)*amount));
  b = Math.min(255, Math.round(b + (255-b)*amount));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.round(r * (1-amount)));
  g = Math.max(0, Math.round(g * (1-amount)));
  b = Math.max(0, Math.round(b * (1-amount)));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function renderCarousel() {
  const track = document.getElementById('vinylTrack');
  track.innerHTML = '';
  if (!songs.length) return;

  const n = songs.length;
  const positions = [-2, -1, 0, 1, 2];
  const classMap = { '-2': 'far-side', '-1': 'side-left-1', '0': 'active', '1': 'side-right-1', '2': 'far-side' };

  positions.forEach(offset => {
    const idx = ((currentIndex + offset) % n + n) % n;
    const song = songs[idx];
    const slot = document.createElement('div');
    slot.className = `vinyl-slot ${classMap[offset]}`;

    const record = document.createElement('div');
    record.className = 'vinyl-record';
    if (offset === 0 && isPlaying) record.classList.add('playing');
    record.innerHTML = makeVinylSVG(song.color, song.title, song.artist);
    record.style.color = song.color;

    record.addEventListener('click', () => {
      if (offset === 0) togglePlay();
      else navigate(offset > 0 ? 1 : -1);
    });

    slot.appendChild(record);
    track.appendChild(slot);
  });
}

function stopAndResetAudio() {
  currentAudio.pause();
  currentAudio.currentTime = 0;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('displayDuration').textContent = "0:00";
}

function navigate(dir) {
  if (!songs.length) return;
  stopAndResetAudio();
  isPlaying = false;
  updatePlayBtn();
  currentIndex = ((currentIndex + dir) % songs.length + songs.length) % songs.length;
  renderCarousel();
  updateDisplay();
  highlightSongRow();
  const track = document.getElementById('vinylTrack');
  track.style.transform = `translateX(${dir * -30}px)`;
  setTimeout(() => { track.style.transform = 'translateX(0)'; }, 50);
}

function goToSong(idx) {
  stopAndResetAudio();
  isPlaying = false;
  updatePlayBtn();
  currentIndex = idx;
  renderCarousel();
  updateDisplay();
  highlightSongRow();
}

function updateDisplay() {
  if (!songs.length) return;
  const s = songs[currentIndex];
  document.getElementById('displayTitle').textContent = s.title;
  document.getElementById('displayArtist').textContent = `— ${s.artist} —`;
}

function togglePlay() {
  if (!songs.length) { 
      showAlert('No hay obras en el catálogo.', 'error'); 
      return; 
  }
  
  const s = songs[currentIndex];
  
  if (!s.audio_url) {
      showAlert('Esta obra no tiene un archivo de audio asociado.', 'error');
      return;
  }

  if (!isPlaying) {
      if (!currentAudio.src.endsWith(s.audio_url)) {
          currentAudio.src = s.audio_url;
      }
      currentAudio.play();
      isPlaying = true;
  } else {
      currentAudio.pause();
      isPlaying = false;
  }
  updatePlayBtn();
  renderCarousel();
}

function updatePlayBtn() {
  const btn = document.getElementById('playBtn');
  const icon = document.getElementById('playIcon');
  if (isPlaying) {
    btn.classList.add('active');
    icon.className = 'bi bi-pause-fill';
  } else {
    btn.classList.remove('active');
    icon.className = 'bi bi-play-fill';
  }
}

function renderSongList(filter = '') {
  const panel = document.getElementById('songListPanel');
  const lf = filter.toLowerCase();
  const filtered = songs.filter(s =>
    s.title.toLowerCase().includes(lf) || s.artist.toLowerCase().includes(lf)
  );
  document.getElementById('songCount').textContent = songs.length;

  if (!filtered.length) {
    panel.innerHTML = '<p style="color:#555;text-align:center;padding:1rem;font-family:Special Elite,cursive;">Sin resultados</p>';
    return;
  }

  panel.innerHTML = filtered.map((s, localIdx) => {
    const realIdx = songs.indexOf(s);
    const isActive = realIdx === currentIndex;
    return `
    <div class="song-row ${isActive ? 'active' : ''}" onclick="goToSong(${realIdx})" id="row-${realIdx}">
      <span class="num">${(realIdx + 1).toString().padStart(2,'0')}</span>
      <span class="dot" style="background:${s.color}"></span>
      <div class="info">
        <div class="t">${s.title}</div>
        <div class="a">${s.artist}</div>
      </div>
    </div>`;
  }).join('');
}

function highlightSongRow() {
  document.querySelectorAll('.song-row').forEach(r => r.classList.remove('active'));
  const row = document.getElementById(`row-${currentIndex}`);
  if (row) { row.classList.add('active'); row.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

function filterSongs(val) { renderSongList(val); }

let alertTimeout = null;
function showAlert(msg, type = 'info') {
  const box = document.getElementById('alertBox');
  const el = document.getElementById('alertMsg');
  const txt = document.getElementById('alertText');
  el.className = `alert alert-jukebox alert-dismissible mb-3 ${type}`;
  txt.textContent = msg;
  box.style.display = 'block';
  if (alertTimeout) clearTimeout(alertTimeout);
  alertTimeout = setTimeout(hideAlert, 3500);
}
function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

renderCarousel();
updateDisplay();
renderSongList();
updatePlayBtn();
</script>
</body>
</html>
